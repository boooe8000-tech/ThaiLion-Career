<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ตรวจสอบสถานะ | AirAsia Thai X</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kanit', sans-serif; background-color: #f3f4f6; }</style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div id="search-section" class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md">
        <h2 class="text-2xl font-bold text-center mb-6">เช็คสถานะการสมัคร</h2>
        <div class="space-y-4">
            <input type="text" id="user" placeholder="Roblox Username" class="w-full border-2 p-3 rounded-xl outline-none">
            <input type="password" id="pass" placeholder="รหัสผ่านของคุณ" class="w-full border-2 p-3 rounded-xl outline-none">
            <button onclick="check()" class="w-full bg-red-600 text-white py-3 rounded-xl font-bold shadow-lg">ค้นหา</button>
        </div>
    </div>

    <div id="result-section" class="hidden bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md text-center">
        <h2 id="res-name" class="text-2xl font-bold mb-2"></h2>
        <p id="res-dept" class="text-red-600 mb-6 font-bold"></p>
        <div id="status-badge" class="inline-block px-8 py-2 rounded-full text-white font-bold text-lg mb-6"></div>
        
        <div id="confirm-box" class="hidden border-2 border-dashed p-4 rounded-xl">
            <p class="font-bold mb-3">กรุณายืนยันการรับสิทธิ์</p>
            <div class="flex gap-2">
                <button onclick="updateConfirm('ยืนยัน')" class="bg-green-500 text-white flex-1 py-2 rounded-lg font-bold">ยืนยัน</button>
                <button onclick="updateConfirm('สละสิทธิ์')" class="bg-gray-400 text-white flex-1 py-2 rounded-lg font-bold">สละสิทธิ์</button>
            </div>
            <p id="confirm-status-text" class="text-xs mt-3 text-blue-600 italic"></p>
        </div>
        <button onclick="location.reload()" class="mt-8 text-gray-400 text-sm underline">ค้นหาใหม่</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AiZaSyC-y19Y2WF-3efQ0ixWZnosrOeqFaDRvMQ",
            authDomain: "airasia-thaix-career.firebaseapp.com",
            databaseURL: "https://airasia-thaix-career-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "airasia-thaix-career"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let loggedUser = "";

        function check() {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            db.ref('Applications/' + u).once('value', (s) => {
                const d = s.val();
                if(d && d.password === p) {
                    loggedUser = u;
                    document.getElementById('search-section').classList.add('hidden');
                    document.getElementById('result-section').classList.remove('hidden');
                    document.getElementById('res-name').innerText = u;
                    document.getElementById('res-dept').innerText = "ตำแหน่ง: " + d.department;
                    const b = document.getElementById('status-badge');
                    b.innerText = d.status;
                    b.className = "inline-block px-8 py-2 rounded-full text-white font-bold text-lg mb-6 " + (d.status==='Passed'?'bg-green-500':d.status==='Failed'?'bg-red-600':'bg-blue-600');
                    if(d.status === 'Passed') {
                        document.getElementById('confirm-box').classList.remove('hidden');
                        document.getElementById('confirm-status-text').innerText = d.confirmStatus ? "สถานะปัจจุบัน: " + d.confirmStatus : "";
                    }
                } else { alert("ไม่พบข้อมูลหรือรหัสผ่านผิดครับ"); }
            });
        }

        function updateConfirm(choice) {
            db.ref('Applications/' + loggedUser).update({ confirmStatus: choice })
            .then(() => alert("บันทึกการตัดสินใจเรียบร้อยแล้วครับ"));
        }
    </script>
</body>
</html>
