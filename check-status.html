<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Status | AirAsia Thai X</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: #0f172a;
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('plane.png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .status-card {
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-top: 8px solid #ce1219;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="status-card p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md text-gray-800">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-red-600 italic uppercase">Check Status</h1>
            <p class="text-[10px] text-gray-400 uppercase tracking-widest mt-1">ตรวจสอบสถานะการสมัครงาน</p>
        </div>
        
        <div id="search-area" class="space-y-4">
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Username (ที่ใช้สมัคร)</label>
                <input type="text" id="check-user" placeholder="กรอกชื่อเล่นของคุณ" class="w-full border-2 border-gray-100 p-4 rounded-2xl outline-none focus:border-red-500 transition text-gray-700">
            </div>
            <button onclick="checkStatus()" class="w-full bg-red-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-red-700 shadow-xl transition active:scale-95 mt-2">
                ตรวจสอบข้อมูล 🔍
            </button>
            <a href="index.html" class="block text-center text-xs text-gray-400 hover:text-red-500 mt-4 transition">กลับหน้าหลัก</a>
        </div>

        <div id="result-area" class="hidden mt-6 pt-6 border-t border-gray-100 text-center animate-pulse">
            <p class="text-xs text-gray-400 uppercase mb-1">ผลการสมัครของคุณ</p>
            <h2 id="res-name" class="text-xl font-bold text-gray-800 mb-4"></h2>
            
            <div id="res-status-box" class="inline-block px-6 py-2 rounded-full text-sm font-bold uppercase tracking-widest mb-4">
                </div>
            
            <p id="res-dept" class="text-xs text-gray-500 italic"></p>
            
            <button onclick="location.reload()" class="w-full bg-gray-100 text-gray-500 py-3 rounded-2xl font-bold text-xs mt-6">เช็คชื่ออื่น</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AiZaSyC-y19Y2WF-3efQ0ixWZnosrOeqFaDRvMQ",
            authDomain: "airasia-thaix-career.firebaseapp.com",
            databaseURL: "https://airasia-thaix-career-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "airasia-thaix-career"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function checkStatus() {
            const user = document.getElementById('check-user').value.trim();
            if(!user) return alert("กรุณากรอกชื่อที่ใช้สมัครครับ");

            db.ref('Applications/' + user).once('value', snap => {
                const data = snap.val();
                if(!data) {
                    alert("ไม่พบข้อมูลการสมัครของชื่อนี้ กรุณาตรวจสอบชื่ออีกครั้ง");
                    return;
                }

                document.getElementById('search-area').classList.add('hidden');
                const resArea = document.getElementById('result-area');
                resArea.classList.remove('hidden');
                
                document.getElementById('res-name').innerText = user;
                document.getElementById('res-dept').innerText = "Position: " + data.department;
                
                const statusBox = document.getElementById('res-status-box');
                const status = data.status;

                // ปรับแต่งสีตามสถานะ
                if(status === "Pending") {
                    statusBox.innerText = "กำลังรอตรวจสอบ (Pending)";
                    statusBox.className = "inline-block px-6 py-2 rounded-full text-sm font-bold uppercase tracking-widest mb-4 bg-gray-200 text-gray-600";
                } else if(status === "Interview") {
                    statusBox.innerText = "เรียกสัมภาษณ์ (Interview)";
                    statusBox.className = "inline-block px-6 py-2 rounded-full text-sm font-bold uppercase tracking-widest mb-4 bg-yellow-400 text-black";
                } else if(status === "Passed") {
                    statusBox.innerText = "ผ่านการคัดเลือก (Passed)";
                    statusBox.className = "inline-block px-6 py-2 rounded-full text-sm font-bold uppercase tracking-widest mb-4 bg-green-500 text-white";
                } else if(status === "Failed") {
                    statusBox.innerText = "ไม่ผ่านการคัดเลือก (Failed)";
                    statusBox.className = "inline-block px-6 py-2 rounded-full text-sm font-bold uppercase tracking-widest mb-4 bg-red-600 text-white";
                }
            });
        }
    </script>
</body>
</html>
