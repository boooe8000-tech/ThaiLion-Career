<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirAsia Thai X | Career</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f3f4f6; }
        .airasia-red-bg { background-color: #ce1219; }
        .disabled-btn { background-color: #9ca3af !important; cursor: not-allowed; }
        
        /* สไตล์สำหรับเมนูบนสุด */
        .nav-link { font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; color: white; }
        .nav-link:hover { color: #fecaca; }

        /* ส่วนใหม่: Hero Section ที่ใช้รูป seat.png เป็นพื้นหลัง */
        .hero-section-with-bg {
            /* ใส่สีแดง AirAsia ทับรูปไว้ 80% เพื่อให้ข้อความอ่านง่าย */
            background-image: linear-gradient(rgba(206, 18, 25, 0.8), rgba(206, 18, 25, 0.8)), url('seat.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body class="bg-gray-50">

    <nav class="airasia-red-bg py-4 px-6 flex justify-between items-center shadow-lg sticky top-0 z-[100]">
        <div class="flex items-center gap-2">
            <div class="w-2 h-6 bg-white rounded-full"></div>
            <span class="font-bold italic tracking-tighter uppercase text-sm text-white">AirAsia <span class="font-light">Thai X</span></span>
        </div>
        <div class="flex gap-4">
            <a href="check-status.html" class="nav-link">เช็คสถานะ</a>
            <a href="staff.html" class="nav-link bg-white/20 px-3 py-1 rounded-lg">Staff Login</a>
        </div>
    </nav>

    <div class="hero-section-with-bg h-64 w-full flex items-center justify-center text-white relative overflow-hidden -mt-1">
        <div class="z-10 text-center">
            <h1 class="text-4xl font-bold italic tracking-tighter uppercase">Recruitment AirAsia</h1>
            <p class="text-[10px] opacity-80 mt-2 uppercase tracking-[0.3em] font-light">Best Airline In The World</p>
        </div>
    </div>

    <div class="max-w-4xl mx-auto -mt-10 p-4 relative z-20">
        <div class="bg-white rounded-[2.5rem] shadow-2xl p-8 mb-10 border-t-8 border-red-600">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-2">
                ตำแหน่งที่เปิดรับสมัคร
            </h2>
            
            <div id="dept-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <p class="text-center text-gray-400 py-10 col-span-full italic">กำลังตรวจสอบเที่ยวบิน (โหลดข้อมูล)...</p>
            </div>
        </div>
    </div>

    <div id="apply-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[150] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h3 id="modal-dept-title" class="text-2xl font-bold text-red-600"></h3>
                    <p class="text-[10px] text-gray-400 uppercase tracking-widest italic">Recruitment Form</p>
                </div>
                <button onclick="closeModal()" class="text-gray-300 hover:text-red-500 text-2xl">&times;</button>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-gray-500 ml-1 uppercase">ชื่อเล่น (In-game Name)</label>
                    <input type="text" id="app-name" placeholder="ระบุชื่อเพื่อใช้เข้าสู่ระบบ" class="w-full border-2 border-gray-100 p-4 rounded-2xl outline-none focus:border-red-500 transition">
                </div>
                <div id="questions-area" class="space-y-4"></div>
                <button onclick="submitApp()" class="w-full airasia-red-bg text-white py-4 rounded-2xl font-bold text-lg hover:opacity-90 transition shadow-lg mt-4 shadow-red-200">ส่งใบสมัคร ✈️</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AiZaSyC-y19Y2WF-3efQ0ixWZnosrOeqFaDRvMQ",
            authDomain: "airasia-thaix-career.firebaseapp.com",
            databaseURL: "https://airasia-thaix-career-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "airasia-thaix-career"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentDept = "";
        let currentQuestions = [];

        function loadDepts() {
            db.ref('Settings/Departments').on('value', snap => {
                const container = document.getElementById('dept-container');
                container.innerHTML = "";
                if(!snap.exists()) {
                    container.innerHTML = "<p class='col-span-full text-center text-gray-400'>ยังไม่มีตำแหน่งที่เปิดรับในขณะนี้</p>";
                    return;
                }
                snap.forEach(child => {
                    const d = child.val();
                    const statusText = d.isOpen ? "Status: Open" : "Status: Closed";
                    const statusColor = d.isOpen ? "text-green-500" : "text-red-500 font-bold";
                    const btnClass = d.isOpen ? "airasia-red-bg" : "disabled-btn";
                    
                    container.innerHTML += `
                        <div class="border-2 border-gray-50 p-6 rounded-[2rem] hover:border-red-100 transition group bg-white shadow-sm flex flex-col justify-between">
                            <div>
                                <h4 class="text-lg font-bold text-gray-800">${d.name}</h4>
                                <p class="text-xs text-gray-400 mt-1 mb-4 h-8 overflow-hidden">${d.requirement || 'ต้องการผู้มีใจรักในงานบริการ'}</p>
                            </div>
                            <div>
                                <p class="text-[9px] mb-3 ${statusColor} uppercase tracking-widest">${statusText}</p>
                                <button onclick="${d.isOpen ? `openModal('${d.name}', '${d.questions}')` : ''}" 
                                    class="w-full ${btnClass} text-white py-3 rounded-xl text-xs font-bold transition">
                                    ${d.isOpen ? 'Apply Now' : 'Closed'}
                                </button>
                            </div>
                        </div>
                    `;
                });
            });
        }

        function openModal(name, qs) {
            currentDept = name;
            currentQuestions = qs ? qs.split(',') : [];
            document.getElementById('modal-dept-title').innerText = name;
            const area = document.getElementById('questions-area');
            area.innerHTML = "";
            currentQuestions.forEach((q, i) => {
                area.innerHTML += `
                    <div>
                        <label class="text-[10px] font-bold text-gray-500 ml-1 uppercase">คำถาม: ${q.trim()}</label>
                        <textarea class="q-input w-full border-2 border-gray-100 p-4 rounded-2xl outline-none focus:border-red-500 transition" rows="2"></textarea>
                    </div>
                `;
            });
            document.getElementById('apply-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('apply-modal').classList.add('hidden'); }

        function submitApp() {
            const name = document.getElementById('app-name').value.trim();
            if(!name) return alert("กรุณากรอกชื่อเล่นเพื่อใช้ในการเช็คผล");
            
            const answers = [];
            document.querySelectorAll('.q-input').forEach(input => answers.push(input.value.trim()));

            db.ref('Applications/' + name).set({
                department: currentDept,
                answers: answers,
                status: "Pending",
                time: new Date().toLocaleString('th-TH')
            }).then(() => {
                alert("บันทึกข้อมูลเรียบร้อย! คุณสามารถใช้ชื่อเล่นเพื่อเช็คสถานะได้ในภายหลัง");
                closeModal();
            });
        }

        loadDepts();
    </script>
</body>
</html>
