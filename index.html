<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirAsia Thai X | Career</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f3f4f6; }
        .airasia-red { background-color: #ce1219; }
        .disabled-btn { background-color: #9ca3af !important; cursor: not-allowed; }
    </style>
</head>
<body class="bg-gray-50">
    <div class="airasia-red h-64 w-full flex items-center justify-center text-white relative overflow-hidden">
        <div class="z-10 text-center">
            <h1 class="text-4xl font-bold italic tracking-tighter uppercase">AirAsia <span class="font-light">Thai X</span></h1>
            <p class="text-sm opacity-80 mt-2 uppercase tracking-widest">Join our professional team</p>
        </div>
    </div>

    <div class="max-w-4xl mx-auto -mt-10 p-4 relative z-20">
        <div class="bg-white rounded-3xl shadow-2xl p-8 mb-10">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-2">
                <span class="w-2 h-8 airasia-red rounded-full"></span> ตำแหน่งที่เปิดรับสมัคร
            </h2>
            
            <div id="dept-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <p class="text-center text-gray-400 py-10 col-span-full">กำลังโหลดข้อมูลแผนก...</p>
            </div>
        </div>
    </div>

    <div id="apply-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl max-h-[90vh] overflow-y-auto">
            <h3 id="modal-dept-title" class="text-2xl font-bold text-red-600 mb-2"></h3>
            <p class="text-xs text-gray-400 mb-6 uppercase tracking-widest">Application Form</p>
            
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-gray-500 ml-1 uppercase">ชื่อเล่น (In-game Name)</label>
                    <input type="text" id="app-name" class="w-full border-2 border-gray-100 p-4 rounded-2xl outline-none focus:border-red-500 transition">
                </div>
                <div id="questions-area" class="space-y-4"></div>
                <button onclick="submitApp()" class="w-full airasia-red text-white py-4 rounded-2xl font-bold text-lg hover:opacity-90 transition shadow-lg mt-4">ส่งใบสมัคร ✈️</button>
                <button onclick="closeModal()" class="w-full bg-gray-100 text-gray-500 py-3 rounded-2xl font-bold text-sm">ยกเลิก</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AiZaSyC-y19Y2WF-3efQ0ixWZnosrOeqFaDRvMQ",
            authDomain: "airasia-thaix-career.firebaseapp.com",
            databaseURL: "https://airasia-thaix-career-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "airasia-thaix-career"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentDept = "";
        let currentQuestions = [];

        function loadDepts() {
            db.ref('Settings/Departments').on('value', snap => {
                const container = document.getElementById('dept-container');
                container.innerHTML = "";
                snap.forEach(child => {
                    const d = child.val();
                    const statusText = d.isOpen ? "เปิดรับสมัคร" : "ปิดรับสมัคร";
                    const statusColor = d.isOpen ? "text-green-500" : "text-red-500 font-bold";
                    const btnClass = d.isOpen ? "airasia-red" : "disabled-btn";
                    
                    container.innerHTML += `
                        <div class="border-2 border-gray-50 p-6 rounded-[2rem] hover:border-red-100 transition group bg-white shadow-sm">
                            <h4 class="text-lg font-bold text-gray-800">${d.name}</h4>
                            <p class="text-xs text-gray-400 mt-1 mb-4">${d.requirement || 'ไม่ระบุคุณสมบัติ'}</p>
                            <p class="text-[10px] mb-4 ${statusColor} uppercase tracking-tighter">${statusText}</p>
                            <button onclick="${d.isOpen ? `openModal('${d.name}', '${d.questions}')` : ''}" 
                                class="w-full ${btnClass} text-white py-3 rounded-xl text-xs font-bold transition">
                                ${d.isOpen ? 'สมัครตำแหน่งนี้' : 'ขณะนี้ปิดรับสมัคร'}
                            </button>
                        </div>
                    `;
                });
            });
        }

        function openModal(name, qs) {
            currentDept = name;
            currentQuestions = qs ? qs.split(',') : [];
            document.getElementById('modal-dept-title').innerText = name;
            const area = document.getElementById('questions-area');
            area.innerHTML = "";
            currentQuestions.forEach((q, i) => {
                area.innerHTML += `
                    <div>
                        <label class="text-xs font-bold text-gray-500 ml-1">${q.trim()}</label>
                        <textarea class="q-input w-full border-2 border-gray-100 p-4 rounded-2xl outline-none focus:border-red-500 transition" rows="2"></textarea>
                    </div>
                `;
            });
            document.getElementById('apply-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('apply-modal').classList.add('hidden'); }

        function submitApp() {
            const name = document.getElementById('app-name').value.trim();
            if(!name) return alert("กรุณากรอกชื่อเล่น");
            
            const answers = [];
            document.querySelectorAll('.q-input').forEach(input => answers.push(input.value.trim()));

            db.ref('Applications/' + name).set({
                department: currentDept,
                answers: answers,
                status: "Pending",
                time: new Date().toLocaleString('th-TH')
            }).then(() => {
                alert("ส่งใบสมัครสำเร็จ! กรุณารอการตรวจสอบ");
                location.reload();
            });
        }

        loadDepts();
    </script>
</body>
</html>
