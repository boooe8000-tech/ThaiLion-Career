<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirAsia Thai X | Career</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .airasia-red { background-color: #ce1219; }
        .hero { position: relative; z-index: 10; }
        .main-content { position: relative; z-index: 20; margin-top: -2rem; } /* ปรับค่าให้การ์ดลอยขึ้นเล็กน้อยแต่ไม่ทับข้อความ */
    </style>
</head>
<body>

    <nav class="airasia-red p-4 text-white shadow-xl sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="font-bold italic uppercase tracking-tighter text-xl">airasia <span class="font-light text-xs not-italic border-l pl-2 border-white/20">THAI X CAREER</span></h1>
            <div class="flex gap-2">
                <a href="check-status.html" class="bg-white text-red-600 px-4 py-1.5 rounded-full text-xs font-bold shadow-md">STATUS</a>
                <a href="staff.html" class="bg-black text-white px-4 py-1.5 rounded-full text-xs font-bold shadow-md">STAFF</a>
            </div>
        </div>
    </nav>

    <div class="hero airasia-red text-white py-20 px-6 text-center">
        <h2 class="text-4xl md:text-6xl font-bold uppercase tracking-tighter mb-2">Join Our Team</h2>
        <p class="text-red-100 italic text-sm md:text-base opacity-80">"Now Everyone Can Fly... and Work with us!"</p>
    </div>

    <div class="main-content max-w-6xl mx-auto px-6 pb-20">
        <div id="job-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </div>

    <div id="apply-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-[100] backdrop-blur-sm">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-lg relative shadow-2xl overflow-y-auto max-h-[90vh]">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-300 hover:text-red-600 text-xl">✕</button>
            <h3 id="modal-title" class="text-2xl font-bold text-red-600 italic uppercase text-center mb-6"></h3>
            
            <div class="space-y-4">
                <div class="group">
                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Roblox Username</label>
                    <input type="text" id="username" class="w-full border-2 border-gray-100 p-4 rounded-2xl focus:border-red-500 outline-none bg-gray-50/50 transition">
                </div>
                <div class="group">
                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Password</label>
                    <input type="password" id="password" class="w-full border-2 border-gray-100 p-4 rounded-2xl focus:border-red-500 outline-none bg-gray-50/50 transition">
                </div>
                
                <div id="custom-questions" class="space-y-4 pt-4 border-t"></div>
                
                <button onclick="submitApp()" id="btn-submit" class="w-full airasia-red text-white py-4 rounded-2xl font-bold text-lg hover:bg-red-700 shadow-xl mt-6 uppercase tracking-widest transition active:scale-95">ส่งใบสมัคร ✈️</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AiZaSyC-y19Y2WF-3efQ0ixWZnosrOeqFaDRvMQ",
            authDomain: "airasia-thaix-career.firebaseapp.com",
            databaseURL: "https://airasia-thaix-career-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "airasia-thaix-career"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentDept = "";

        db.ref('Settings/Departments').on('value', snap => {
            const container = document.getElementById('job-container');
            container.innerHTML = "";
            snap.forEach(c => {
                const d = c.val();
                if(d.isOpen) {
                    container.innerHTML += `
                        <div class="bg-white p-8 rounded-[2rem] shadow-xl border border-gray-100 hover:-translate-y-2 transition duration-300">
                            <h3 class="text-2xl font-bold text-gray-800 italic uppercase mb-2 border-b-4 border-red-600 inline-block">${d.name}</h3>
                            <p class="text-gray-400 text-[10px] mt-4 mb-8 font-light italic uppercase tracking-tighter">Requirement: ${d.requirement || '-'}</p>
                            <button onclick="openForm('${d.name}', '${d.questions}')" class="w-full bg-black text-white py-3 rounded-xl font-bold uppercase text-xs tracking-widest hover:bg-red-600 transition shadow-lg">Apply Now</button>
                        </div>
                    `;
                }
            });
        });

        function openForm(name, questions) {
            currentDept = name;
            document.getElementById('modal-title').innerText = name;
            const qBox = document.getElementById('custom-questions');
            qBox.innerHTML = "";
            if(questions) {
                const qList = questions.split(',');
                qList.forEach((q, i) => {
                    qBox.innerHTML += `
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Q${i+1}: ${q.trim()}</label>
                            <textarea class="q-input w-full border-2 border-gray-100 p-3 rounded-xl focus:border-red-500 outline-none bg-gray-50/50" rows="2"></textarea>
                        </div>
                    `;
                });
            }
            document.getElementById('apply-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('apply-modal').classList.add('hidden'); }

        function submitApp() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            if(!user || !pass) return alert("กรุณากรอกข้อมูลให้ครบถ้วน");

            const ans = [];
            document.querySelectorAll('.q-input').forEach(ta => ans.push(ta.value.trim()));

            db.ref('Applications/' + user).set({
                department: currentDept,
                password: pass,
                status: "Pending",
                answers: ans,
                applyDate: new Date().toLocaleString('th-TH')
            }).then(() => {
                alert("ส่งใบสมัครสำเร็จ!");
                location.reload();
            });
        }
    </script>
</body>
</html>
