<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>AirAsia Staff Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body class="bg-[#0b0f19] text-white font-sans min-h-screen flex items-center justify-center p-6">

    <!-- 🔒 หน้า Login -->
    <div id="login-overlay" class="max-w-md w-full bg-slate-900/50 p-10 rounded-[2rem] border border-white/5 shadow-2xl">
        <h2 class="text-3xl font-black text-center mb-8 italic uppercase text-red-600">Staff Login</h2>
        <div class="space-y-4">
            <input type="text" id="u" placeholder="Staff ID (เช่น 10yji94)" class="w-full bg-black p-4 rounded-xl outline-none border border-slate-800 focus:border-red-600 font-bold">
            <input type="password" id="p" placeholder="Password (เช่น 25568)" class="w-full bg-black p-4 rounded-xl outline-none border border-slate-800 focus:border-red-600 font-bold">
            <button onclick="doLogin()" class="w-full bg-red-600 py-4 rounded-xl font-black hover:bg-red-500 transition">ACCESS SYSTEM</button>
        </div>
        <p id="err" class="text-red-500 text-xs text-center mt-4 font-bold hidden uppercase">Login Failed: ข้อมูลไม่ถูกต้อง</p>
    </div>

    <!-- ✈️ หน้าหลัก (ซ่อนไว้ก่อน) -->
    <div id="main" class="hidden fixed inset-0 bg-[#0b0f19] p-10 overflow-auto">
        <h1 class="text-4xl font-black italic">WELCOME, <span id="user-name" class="text-red-600"></span></h1>
        <p id="user-rank" class="text-gray-500 font-bold uppercase tracking-widest mt-1"></p>
        <hr class="my-8 border-slate-800">
        <div id="apps" class="grid gap-4 md:grid-cols-2 lg:grid-cols-3"></div>
    </div>

    <script>
        // ใช้ Config เดิมที่คุณ Dom มี
        const firebaseConfig = {
            apiKey: "AiZaSyC-y19Y2WF-3efQ0ixWZnosrOeqFaDRvMQ",
            databaseURL: "https://airasia-thaix-career-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function doLogin() {
            const user = document.getElementById('u').value.trim();
            const pass = document.getElementById('p').value.trim();
            
            // เช็คเข้าโฟลเดอร์ StaffAccounts ตามรูปเป๊ะๆ
            db.ref('StaffAccounts/' + user).once('value').then(snap => {
                const data = snap.val();
                
                // ตรวจสอบว่ารหัสตรงกับ "25568" หรือรหัสที่อยู่ในเบสไหม
                if (data && String(data.password) === String(pass)) {
                    document.getElementById('login-overlay').classList.add('hidden');
                    document.getElementById('main').classList.remove('hidden');
                    
                    document.getElementById('user-name').innerText = user;
                    
                    // บังคับยศให้ Dom เป็น Head Supervisor ตามสั่ง
                    if (user.toLowerCase() === 'dom') {
                        document.getElementById('user-rank').innerText = "Head Supervisor";
                    } else {
                        document.getElementById('user-rank').innerText = data.role || "Staff";
                    }
                    
                    loadData();
                } else {
                    document.getElementById('err').classList.remove('hidden');
                }
            }).catch(e => alert("Firebase Error: " + e.message));
        }

        function loadData() {
            db.ref('Applications').on('value', snap => {
                const cont = document.getElementById('apps');
                cont.innerHTML = "";
                snap.forEach(c => {
                    const a = c.val();
                    cont.innerHTML += `<div class="bg-slate-900 p-6 rounded-2xl border border-white/5">
                        <h3 class="text-xl font-bold">${c.key}</h3>
                        <p class="text-red-500 text-xs font-bold uppercase">${a.department || 'No Dept'}</p>
                    </div>`;
                });
            });
        }
    </script>
</body>
</html>
