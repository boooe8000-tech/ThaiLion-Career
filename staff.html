<style>
    body {
        font-family: 'Kanit', sans-serif;
        margin: 0;
        padding: 0;
        min-h: 100vh;
        display: flex;
        items-center;
        justify-center;
        /* พ่นโค้ดสั่งให้ภาพเป็นพื้นหลังตรงนี้ครับคุณ Dom */
        background-image: url('plane.png'); /* แก้ชื่อไฟล์ให้ตรงกับที่อัปโหลดนะ */
        background-size: cover; /* สั่งให้ภาพขยายเต็มจอ */
        background-position: center; /* สั่งให้อยู่ตรงกลาง */
        background-repeat: no-repeat; /* สั่งห้ามภาพวนซ้ำ */
        background-attachment: fixed; /* สั่งให้ภาพอยู่กับที่เวลาเลื่อนจอ */
    }

    /* เพิ่ม CSS เพื่อให้กล่อง Login ดูเด่นขึ้นเมื่ออยู่บนภาพพื้นหลัง */
    #login-section {
        min-h: auto !important; /* เอาค่า min-h เดิมออก */
    }

    #login-section .bg-white {
        background-color: rgba(255, 255, 255, 0.95); /* ทำให้กล่อง Login โปรงแสงนิดนึงเพื่อให้เห็นพื้นหลังลางๆ */
        backdrop-filter: blur(5px); /* เพิ่มเอฟเฟกต์เบลอหลังกล่อง */
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); /* เพิ่มเงาให้ดูมีมิติ */
    }
</style>
