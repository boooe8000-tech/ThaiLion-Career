<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirAsia Staff Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #0b0f19; color: #e2e8f0; margin: 0; }
        .airasia-red { color: #ce1219; }
        .airasia-red-bg { background-color: #ce1219; }
        .glass-panel { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .status-badge { font-size: 10px; padding: 2px 8px; border-radius: 99px; font-weight: bold; text-transform: uppercase; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen">

    <!-- 🌐 Sidebar / Header Area -->
    <div class="max-w-7xl mx-auto p-4 md:p-8">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-10 bg-slate-900/80 p-8 rounded-[2.5rem] border border-slate-800 shadow-2xl">
            <div class="flex items-center gap-5">
                <div class="w-4 h-12 airasia-red-bg rounded-full animate-pulse"></div>
                <div>
                    <h1 class="text-3xl font-black italic tracking-tighter uppercase text-white">Staff Control <span class="text-red-600 font-light">Center</span></h1>
                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-[0.4em]">AirAsia Thai X Management</p>
                </div>
            </div>
            <div class="flex gap-3">
                <div class="bg-slate-800 px-5 py-2 rounded-2xl border border-slate-700 text-right">
                    <p class="text-[10px] text-gray-500 uppercase font-bold">System Status</p>
                    <p class="text-xs text-green-400 font-bold">● Connected to Firebase</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            
            <!-- ⚙️ ส่วนจัดการแผนก (Department Management) -->
            <div class="lg:col-span-1 space-y-6">
                <h2 class="text-sm font-bold uppercase tracking-widest text-gray-400 ml-2">Department Editor</h2>
                <div class="glass-panel p-6 rounded-[2rem] space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">ชื่อแผนก</label>
                        <input type="text" id="set-dept-name" placeholder="เช่น Pilot" class="w-full bg-slate-800 border-none p-3 rounded-xl mt-1 text-sm focus:ring-2 ring-red-500 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">คำถาม (คั่นด้วยคอมม่า ,)</label>
                        <textarea id="set-dept-qs" placeholder="อายุเท่าไหร่, ทำไมถึงอยากเป็น" class="w-full bg-slate-800 border-none p-3 rounded-xl mt-1 text-sm focus:ring-2 ring-red-500 outline-none h-24"></textarea>
                    </div>
                    <button onclick="saveDept()" class="w-full airasia-red-bg py-3 rounded-xl font-bold hover:brightness-125 transition">SAVE / UPDATE</button>
                </div>

                <div id="dept-status-list" class="space-y-2">
                    <!-- รายการแผนกเพื่อเปิด-ปิด -->
                </div>
            </div>

            <!-- 📋 ส่วนรายการใบสมัคร (Applications List) -->
            <div class="lg:col-span-3 space-y-6">
                <div class="flex justify-between items-center px-2">
                    <h2 class="text-sm font-bold uppercase tracking-widest text-gray-400">Recent Applications</h2>
                    <div class="flex gap-2">
                        <button onclick="filterByStatus('Pending')" class="text-[9px] bg-yellow-600/20 text-yellow-500 border border-yellow-600/30 px-3 py-1 rounded-lg font-bold">PENDING</button>
                        <button onclick="loadApps()" class="text-[9px] bg-slate-800 text-gray-400 px-3 py-1 rounded-lg font-bold">ALL</button>
                    </div>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="app-list-container">
                    <!-- รายชื่อผู้สมัครจะแสดงตรงนี้ -->
                </div>
            </div>
        </div>
    </div>

    <!-- 🔍 Modal ดูรายละเอียดแบบเจาะลึก (ตามรูปตัวอย่าง) -->
    <div id="view-modal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-xl z-[200] flex items-center justify-center p-4">
        <div class="bg-slate-950 w-full max-w-2xl rounded-[3rem] p-10 border border-white/5 shadow-2xl max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-start mb-8">
                <div>
                    <p class="text-[10px] text-red-500 font-bold uppercase tracking-[0.3em] mb-2 italic">Detailed Review</p>
                    <h2 id="view-user" class="text-4xl font-black text-white tracking-tight italic"></h2>
                    <p id="view-dept-info" class="text-xs text-gray-500 font-bold mt-1 uppercase"></p>
                </div>
                <button onclick="document.getElementById('view-modal').classList.add('hidden')" class="bg-slate-800 w-12 h-12 rounded-full text-white text-2xl flex items-center justify-center hover:bg-red-600 transition">&times;</button>
            </div>

            <div id="view-ans-box" class="space-y-4">
                <!-- คำถาม/คำตอบ แสดงที่นี่ -->
            </div>

            <div class="mt-12 grid grid-cols-2 gap-4">
                <button id="btn-approve" class="bg-green-600 hover:bg-green-500 text-white py-5 rounded-2xl font-black text-lg shadow-xl shadow-green-900/20 transition-transform active:scale-95 uppercase">Approve ✔️</button>
                <button id="btn-reject" class="bg-red-700 hover:bg-red-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl shadow-red-900/20 transition-transform active:scale-95 uppercase">Reject ✖️</button>
            </div>
            <button onclick="deleteApp()" class="w-full mt-4 text-[10px] text-gray-600 hover:text-red-500 font-bold uppercase tracking-widest transition">Delete this application</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AiZaSyC-y19Y2WF-3efQ0ixWZnosrOeqFaDRvMQ",
            authDomain: "airasia-thaix-career.firebaseapp.com",
            databaseURL: "https://airasia-thaix-career-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "airasia-thaix-career"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentReviewing = "";

        // --- ระบบแผนก (Departments) ---
        function saveDept() {
            const name = document.getElementById('set-dept-name').value.trim();
            const qs = document.getElementById('set-dept-qs').value.trim();
            if(!name) return alert("ระบุชื่อแผนก");
            db.ref('Settings/Departments/' + name).update({
                name: name,
                questions: qs,
                isOpen: true
            }).then(() => { alert("อัปเดตข้อมูลแผนกสำเร็จ"); });
        }

        function toggleDept(name, currentStatus) {
            db.ref('Settings/Departments/' + name).update({ isOpen: !currentStatus });
        }

        function loadDeptsStaff() {
            db.ref('Settings/Departments').on('value', snap => {
                const list = document.getElementById('dept-status-list');
                list.innerHTML = "";
                snap.forEach(child => {
                    const d = child.val();
                    list.innerHTML += `
                        <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800 flex justify-between items-center">
                            <div>
                                <p class="text-xs font-bold text-white">${d.name}</p>
                                <p class="text-[9px] ${d.isOpen ? 'text-green-500' : 'text-red-500'} font-bold uppercase">${d.isOpen ? 'Open' : 'Closed'}</p>
                            </div>
                            <button onclick="toggleDept('${d.name}', ${d.isOpen})" class="text-[9px] bg-slate-800 px-3 py-1 rounded-lg border border-slate-700 hover:bg-slate-700 font-bold uppercase">Toggle</button>
                        </div>
                    `;
                });
            });
        }

        // --- ระบบใบสมัคร (Applications) ---
        function loadApps() {
            db.ref('Applications').on('value', snap => {
                renderApps(snap);
            });
        }

        function filterByStatus(status) {
            db.ref('Applications').orderByChild('status').equalTo(status).once('value', snap => {
                renderApps(snap);
            });
        }

        function renderApps(snap) {
            const container = document.getElementById('app-list-container');
            container.innerHTML = "";
            if(!snap.exists()) {
                container.innerHTML = "<p class='col-span-full text-center text-gray-600 py-10'>No applications found.</p>";
                return;
            }
            snap.forEach(child => {
                const app = child.val();
                const user = child.key;
                const sColor = app.status === 'Pending' ? 'bg-yellow-500/20 text-yellow-500' : (app.status === 'Approved' ? 'bg-green-500/20 text-green-500' : 'bg-red-500/20 text-red-500');
                
                container.innerHTML += `
                    <div class="glass-panel p-6 rounded-[2rem] hover:border-red-500/50 transition cursor-pointer group" onclick="viewDetail('${user}')">
                        <div class="flex justify-between items-center mb-4">
                            <span class="status-badge ${sColor}">${app.status}</span>
                            <span class="text-[9px] text-gray-600 font-bold">${app.time || ''}</span>
                        </div>
                        <h3 class="text-xl font-bold group-hover:text-red-500 transition">${user}</h3>
                        <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mt-1">${app.department}</p>
                    </div>
                `;
            });
        }

        function viewDetail(user) {
            currentReviewing = user;
            db.ref('Applications/' + user).once('value', s => {
                const d = s.val();
                document.getElementById('view-user').innerText = user;
                document.getElementById('view-dept-info').innerText = "Department: " + d.department;
                const box = document.getElementById('view-ans-box');
                box.innerHTML = "";

                // แสดงผลคำถามคู่คำตอบ (Q & A)
                if(d.fullData) {
                    d.fullData.forEach((item, i) => {
                        box.innerHTML += `
                            <div class="bg-slate-900 p-6 rounded-3xl border border-white/5 shadow-inner">
                                <p class="text-[9px] text-red-600 font-black uppercase mb-2 tracking-widest">Question ${i+1}: ${item.q}</p>
                                <p class="text-sm text-gray-200 font-medium leading-relaxed">${item.a || '-'}</p>
                            </div>
                        `;
                    });
                } else if(d.answers) {
                    d.answers.forEach((ans, i) => {
                        box.innerHTML += `
                            <div class="bg-slate-900 p-6 rounded-3xl border border-white/5 mb-2">
                                <p class="text-[9px] text-gray-500 font-bold mb-1 uppercase">Answer ${i+1} (Legacy Data)</p>
                                <p class="text-sm text-gray-300">${ans}</p>
                            </div>
                        `;
                    });
                }

                document.getElementById('btn-approve').onclick = () => updateStatus(user, 'Approved');
                document.getElementById('btn-reject').onclick = () => updateStatus(user, 'Rejected');
                document.getElementById('view-modal').classList.remove('hidden');
            });
        }

        function updateStatus(user, status) {
            db.ref('Applications/' + user).update({ status: status }).then(() => {
                document.getElementById('view-modal').classList.add('hidden');
            });
        }

        function deleteApp() {
            if(confirm("ยืนยันการลบใบสมัครของ " + currentReviewing + "?")) {
                db.ref('Applications/' + currentReviewing).remove().then(() => {
                    document.getElementById('view-modal').classList.add('hidden');
                });
            }
        }

        loadApps();
        loadDeptsStaff();
    </script>
</body>
</html>
