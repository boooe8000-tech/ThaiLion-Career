<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Staff Control Panel | AirAsia Thai X</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; color: white; }
        .tab-active { background-color: #ef4444 !important; color: white !important; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="login-section" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md text-gray-800 border-t-8 border-red-600">
            <h1 class="text-3xl font-bold text-red-600 mb-6 text-center italic uppercase">Staff Login</h1>
            <input type="text" id="login-user" placeholder="Username" class="w-full border-2 p-3 rounded-xl mb-4 outline-none focus:border-red-500">
            <input type="password" id="login-pass" placeholder="Password" class="w-full border-2 p-3 rounded-xl mb-6 outline-none focus:border-red-500">
            <button onclick="handleLogin()" class="w-full bg-red-600 text-white py-3 rounded-xl font-bold hover:bg-red-700 transition">เข้าสู่ระบบ</button>
        </div>
    </div>

    <div id="staff-dashboard" class="hidden max-w-6xl mx-auto space-y-6">
        <div class="flex justify-between items-center border-b border-slate-700 pb-5">
            <div>
                <h1 class="text-2xl font-bold text-red-500 italic uppercase">AIRASIA <span class="text-white font-light">SYSTEM</span></h1>
                <p id="staff-info" class="text-[10px] text-gray-400 mt-1 uppercase"></p>
            </div>
            <button onclick="location.reload()" class="bg-slate-800 px-4 py-1.5 rounded-lg text-xs font-bold hover:bg-red-600 transition">LOGOUT</button>
        </div>

        <div class="flex gap-2 overflow-x-auto pb-2" id="menu-tabs">
            <button onclick="switchTab('apps')" id="btn-apps" class="bg-slate-800 px-5 py-2 rounded-full text-xs font-bold whitespace-nowrap">ใบสมัคร</button>
            <button onclick="switchTab('depts')" id="btn-depts" class="bg-slate-800 px-5 py-2 rounded-full text-xs font-bold whitespace-nowrap">จัดการแผนก</button>
            <button onclick="switchTab('staffs')" id="btn-staff-manage" class="hidden bg-slate-800 px-5 py-2 rounded-full text-xs font-bold whitespace-nowrap">จัดการบัญชี Staff</button>
            <button onclick="switchTab('logs')" id="btn-logs" class="bg-slate-800 px-5 py-2 rounded-full text-xs font-bold whitespace-nowrap">System Logs</button>
        </div>

        <div id="tab-apps" class="tab-content">
            <div class="bg-slate-800 rounded-2xl border border-slate-700 overflow-hidden shadow-xl">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-900 text-gray-500 text-[10px] uppercase">
                        <tr>
                            <th class="p-4">ผู้สมัคร (คลิกดูคำตอบ)</th>
                            <th class="p-4">แผนก</th>
                            <th class="p-4 text-center">สถานะ</th>
                            <th class="p-4 text-right" id="th-action">ดำเนินการ</th>
                        </tr>
                    </thead>
                    <tbody id="app-list" class="divide-y divide-slate-700"></tbody>
                </table>
            </div>
        </div>

        <div id="tab-depts" class="tab-content hidden space-y-6">
            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                <h3 class="font-bold text-blue-400 mb-4 text-sm uppercase">➕ เพิ่มแผนกและคำถาม (ใช้ , คั่น)</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="dept-name" placeholder="ชื่อแผนก" class="bg-slate-900 border border-slate-700 p-3 rounded-xl outline-none text-sm">
                    <input type="text" id="dept-req" placeholder="คุณสมบัติ" class="bg-slate-900 border border-slate-700 p-3 rounded-xl outline-none text-sm">
                    <textarea id="dept-q" placeholder="คำถาม1, คำถาม2, คำถาม3" class="bg-slate-900 border border-slate-700 p-3 rounded-xl outline-none md:col-span-2 text-sm" rows="3"></textarea>
                    <button onclick="createDept()" class="bg-blue-600 py-3 rounded-xl font-bold col-span-full hover:bg-blue-500 shadow-lg">บันทึกแผนก</button>
                </div>
            </div>
            <div id="dept-list" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
        </div>

        <div id="tab-staffs" class="tab-content hidden space-y-4">
            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                <h3 class="font-bold text-purple-400 mb-4 text-sm uppercase">👤 สร้างบัญชี Staff ใหม่</h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input type="text" id="new-staff-user" placeholder="Username" class="bg-slate-900 border border-slate-700 p-3 rounded-xl text-sm outline-none">
                    <input type="text" id="new-staff-pass" placeholder="Password" class="bg-slate-900 border border-slate-700 p-3 rounded-xl text-sm outline-none">
                    <select id="new-staff-role" class="bg-slate-900 border border-slate-700 p-3 rounded-xl text-sm outline-none">
                        <option value="Admin">Admin (ทำได้เกือบหมด)</option>
                        <option value="Mod">Mod (ดู+สร้างแผนก เท่านั้น)</option>
                    </select>
                    <button onclick="createStaff()" class="bg-purple-600 py-3 rounded-xl font-bold hover:bg-purple-500 shadow-lg">สร้างบัญชี</button>
                </div>
            </div>
            <div id="staff-list" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
        </div>

        <div id="tab-logs" class="tab-content hidden">
            <div id="log-content" class="bg-slate-900 p-4 rounded-2xl text-[11px] font-mono space-y-1 max-h-[500px] overflow-y-auto"></div>
        </div>
    </div>

    <div id="view-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-[100] backdrop-blur-md">
        <div class="bg-slate-900 p-8 rounded-3xl w-full max-w-lg border border-slate-700 shadow-2xl">
            <h3 id="view-user" class="text-xl font-bold text-red-500 mb-4 uppercase italic"></h3>
            <div id="view-ans-box" class="space-y-3 max-h-[60vh] overflow-y-auto pr-2"></div>
            <button onclick="closeModal()" class="w-full bg-slate-800 mt-6 py-3 rounded-xl font-bold hover:bg-slate-700 transition">ปิดหน้าต่าง</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AiZaSyC-y19Y2WF-3efQ0ixWZnosrOeqFaDRvMQ",
            authDomain: "airasia-thaix-career.firebaseapp.com",
            databaseURL: "https://airasia-thaix-career-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "airasia-thaix-career"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let userData = { name: "", role: "" };

        function writeLog(action) {
            db.ref('SystemLogs').push({ staff: userData.name, action, time: new Date().toLocaleString('th-TH') });
        }

        function handleLogin() {
            const u = document.getElementById('login-user').value.trim();
            const p = document.getElementById('login-pass').value.trim();

            if(u === "Dom" && p === "AirAsia") {
                setupDashboard("Dom", "HeadAdmin");
            } else {
                db.ref('Settings/StaffAccounts/' + u).once('value', s => {
                    const d = s.val();
                    if(d && d.password === p) setupDashboard(u, d.role);
                    else alert("ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง");
                });
            }
        }

        function setupDashboard(name, role) {
            userData = { name, role };
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('staff-dashboard').classList.remove('hidden');
            document.getElementById('staff-info').innerText = `User: ${name} | Role: ${role}`;
            
            // จำกัดสิทธิ์ตาม Role
            if(role === "HeadAdmin" || role === "Admin") {
                document.getElementById('btn-staff-manage').classList.remove('hidden');
            }
            if(role === "Mod") {
                document.getElementById('th-action').classList.add('hidden'); // ซ่อนหัวตารางดำเนินการ
            }

            writeLog("Login เข้าระบบ");
            switchTab('apps');
            loadData();
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('#menu-tabs button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('tab-' + id).classList.remove('hidden');
            document.getElementById('btn-' + (id === 'staffs' ? 'staff-manage' : id)).classList.add('tab-active');
        }

        function createStaff() {
            const u = document.getElementById('new-staff-user').value.trim();
            const p = document.getElementById('new-staff-pass').value.trim();
            const r = document.getElementById('new-staff-role').value;
            if(!u || !p) return;
            db.ref('Settings/StaffAccounts/' + u).set({ password: p, role: r }).then(() => {
                writeLog(`สร้างบัญชี Staff: ${u} (${r})`);
                alert("สร้างบัญชีเรียบร้อย");
            });
        }

        function delStaff(u) { if(confirm('ลบบัญชีนี้?')) db.ref('Settings/StaffAccounts/' + u).remove(); }

        function createDept() {
            const n = document.getElementById('dept-name').value.trim();
            const r = document.getElementById('dept-req').value.trim();
            const q = document.getElementById('dept-q').value.trim();
            if(!n) return;
            db.ref('Settings/Departments/' + n).set({ name: n, requirement: r, questions: q, isOpen: true })
            .then(() => {
                writeLog(`สร้างแผนก: ${n}`);
                alert("บันทึกเรียบร้อย");
            });
        }

        function setStatus(user, status) {
            db.ref('Applications/' + user).update({ status }).then(() => writeLog(`ตัดสินผล ${user} -> ${status}`));
        }

        function viewDetail(user) {
            db.ref('Applications/' + user).once('value', s => {
                const d = s.val();
                document.getElementById('view-user').innerText = user;
                const box = document.getElementById('view-ans-box');
                box.innerHTML = "";
                if(d.answers) {
                    d.answers.forEach((ans, i) => {
                        box.innerHTML += `
                            <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700">
                                <p class="text-[9px] text-blue-400 font-bold mb-1 uppercase">คำถามข้อที่ ${i+1}</p>
                                <p class="text-sm">${ans || '-'}</p>
                            </div>
                        `;
                    });
                }
                document.getElementById('view-modal').classList.remove('hidden');
            });
        }

        function closeModal() { document.getElementById('view-modal').classList.add('hidden'); }

        function loadData() {
            // ใบสมัคร
            db.ref('Applications').on('value', snap => {
                const list = document.getElementById('app-list');
                list.innerHTML = "";
                snap.forEach(c => {
                    const a = c.val();
                    const isMod = userData.role === "Mod";
                    list.innerHTML += `
                        <tr class="hover:bg-slate-700/30">
                            <td class="p-4 font-bold text-blue-400 cursor-pointer" onclick="viewDetail('${c.key}')">${c.key} 🔍</td>
                            <td class="p-4 text-gray-400 text-xs">${a.department}</td>
                            <td class="p-4 text-center"><span class="px-2 py-0.5 rounded bg-slate-700 text-[10px] font-bold uppercase">${a.status}</span></td>
                            <td class="p-4 text-right space-x-1 ${isMod ? 'hidden' : ''}">
                                <button onclick="setStatus('${c.key}', 'Passed')" class="bg-green-600 px-3 py-1 rounded text-[10px] font-bold hover:bg-green-500 transition">PASS</button>
                                <button onclick="setStatus('${c.key}', 'Failed')" class="bg-red-600 px-3 py-1 rounded text-[10px] font-bold hover:bg-red-500 transition">FAIL</button>
                            </td>
                        </tr>
                    `;
                });
            });

            // แผนก
            db.ref('Settings/Departments').on('value', snap => {
                const list = document.getElementById('dept-list');
                list.innerHTML = "";
                snap.forEach(c => {
                    const d = c.val();
                    list.innerHTML += `
                        <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700">
                            <h4 class="font-bold text-sm mb-3">${d.name} <span class="text-[9px] ${d.isOpen?'text-green-400':'text-red-400'} ml-2 uppercase">${d.isOpen?'Open':'Closed'}</span></h4>
                            <div class="flex gap-2">
                                <button onclick="db.ref('Settings/Departments/${d.name}').update({isOpen:!${d.isOpen}})" class="bg-slate-700 text-[10px] py-2 rounded flex-1">สลับสถานะ</button>
                                <button onclick="if(confirm('ลบ?')) db.ref('Settings/Departments/${d.name}').remove()" class="bg-red-900/30 text-[10px] py-2 rounded flex-1 text-red-500">ลบ</button>
                            </div>
                        </div>
                    `;
                });
            });

            // บัญชี Staff
            db.ref('Settings/StaffAccounts').on('value', snap => {
                const list = document.getElementById('staff-list');
                list.innerHTML = "";
                snap.forEach(c => {
                    const s = c.val();
                    list.innerHTML += `
                        <div class="bg-slate-800 p-4 rounded-xl border border-purple-900/30 flex justify-between items-center">
                            <div>
                                <p class="text-sm font-bold">${c.key}</p>
                                <p class="text-[9px] text-gray-500 uppercase">${s.role}</p>
                            </div>
                            <button onclick="delStaff('${c.key}')" class="text-red-500 hover:scale-110 transition">🗑️</button>
                        </div>
                    `;
                });
            });

            // Logs
            db.ref('SystemLogs').limitToLast(50).on('value', snap => {
                const box = document.getElementById('log-content');
                box.innerHTML = "";
                let logs = []; snap.forEach(c => logs.push(c.val())); logs.reverse().forEach(l => {
                    box.innerHTML += `<p><span class="text-gray-500">[${l.time.split(' ')[1]}]</span> <span class="text-red-500 font-bold">${l.staff}</span>: <span class="text-gray-300">${l.action}</span></p>`;
                });
            });
        }
    </script>
</body>
</html>
