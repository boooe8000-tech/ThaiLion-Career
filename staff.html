<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirAsia Staff | Secure Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #0b0f19; color: #e2e8f0; overflow-x: hidden; }
        .airasia-red-bg { background-color: #ce1219; }
        .glass-panel { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .login-screen { background-image: radial-gradient(circle at top right, #1e293b, #0b0f19); }
        input::placeholder { color: #475569; }
        .status-pill { font-size: 9px; padding: 3px 10px; border-radius: 50px; font-weight: 800; }
        .scrollbar-custom::-webkit-scrollbar { width: 5px; }
        .scrollbar-custom::-webkit-scrollbar-thumb { background: #ce1219; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen">

    <!-- 🔒 ระบบ Login Staff -->
    <div id="login-overlay" class="fixed inset-0 z-[1000] login-screen flex items-center justify-center p-6">
        <div class="max-w-md w-full glass-panel p-10 rounded-[3rem] shadow-2xl border-t-4 border-red-600">
            <div class="text-center mb-8">
                <div class="inline-block w-16 h-1 w-16 airasia-red-bg rounded-full mb-4"></div>
                <h2 class="text-3xl font-black italic text-white uppercase tracking-tighter">Staff Access</h2>
                <p class="text-[10px] text-gray-500 font-bold uppercase mt-1">Authorized Personnel Only</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="user-login" placeholder="Staff ID / Username" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl outline-none focus:border-red-600 transition font-bold text-white">
                <input type="password" id="pass-login" placeholder="Password" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl outline-none focus:border-red-600 transition font-bold text-white">
                <button onclick="checkLogin()" class="w-full airasia-red-bg text-white py-4 rounded-2xl font-black text-lg hover:brightness-125 transition-all shadow-lg shadow-red-900/40">UNLOCK SYSTEM 🔓</button>
            </div>
            <p id="login-err" class="text-red-500 text-[10px] text-center mt-4 font-bold uppercase hidden">Access Denied: Invalid Credentials</p>
        </div>
    </div>

    <!-- ✈️ Main Dashboard (จะแสดงหลัง Login) -->
    <div id="main-content" class="hidden opacity-0 transition-opacity duration-700">
        <nav class="p-6 flex justify-between items-center border-b border-slate-800 bg-slate-950/50 sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <div class="w-2 h-8 airasia-red-bg rounded-full"></div>
                <span class="font-black italic uppercase tracking-tighter text-xl">Staff Dashboard</span>
            </div>
            <button onclick="location.reload()" class="text-[10px] bg-slate-800 px-4 py-2 rounded-xl font-bold hover:bg-red-600 transition">LOGOUT</button>
        </nav>

        <div class="max-w-7xl mx-auto p-6 md:p-10 grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Left: Management Panel -->
            <div class="lg:col-span-4 space-y-6">
                <div class="glass-panel p-8 rounded-[2.5rem]">
                    <h3 class="text-xs font-black uppercase text-red-500 tracking-[0.2em] mb-6">Manage Departments</h3>
                    <div class="space-y-4">
                        <input type="text" id="dept-name" placeholder="ชื่อแผนก (เช่น Pilot)" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-sm font-bold">
                        <textarea id="dept-qs" placeholder="คำถามที่ 1, คำถามที่ 2 (คั่นด้วยคอมม่า)" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-sm h-32"></textarea>
                        <button onclick="saveDepartment()" class="w-full airasia-red-bg py-4 rounded-xl font-black text-xs uppercase tracking-widest hover:scale-[1.02] transition">Add / Update Department</button>
                    </div>
                    
                    <div class="mt-10 space-y-3" id="dept-list">
                        <!-- รายการแผนกเพื่อเปิด-ปิด -->
                    </div>
                </div>
            </div>

            <!-- Right: Application List -->
            <div class="lg:col-span-8 space-y-6">
                <div class="flex justify-between items-end mb-2">
                    <div>
                        <h2 class="text-3xl font-black italic tracking-tighter uppercase">Applications</h2>
                        <p class="text-[10px] text-gray-500 font-bold uppercase">ใบสมัครที่ส่งเข้ามาทั้งหมด</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="loadAppsByStatus('Pending')" class="text-[10px] bg-yellow-600/10 text-yellow-500 border border-yellow-600/20 px-4 py-2 rounded-xl font-bold">PENDING</button>
                        <button onclick="fetchAllApps()" class="text-[10px] bg-slate-800 text-gray-400 px-4 py-2 rounded-xl font-bold">VIEW ALL</button>
                    </div>
                </div>

                <div id="app-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- รายชื่อผู้สมัครจะเด้งขึ้นตรงนี้ -->
                </div>
            </div>
        </div>
    </div>

    <!-- 🔎 View Details Modal -->
    <div id="view-modal" class="hidden fixed inset-0 bg-black/95 backdrop-blur-md z-[2000] flex items-center justify-center p-4">
        <div class="bg-slate-950 w-full max-w-3xl rounded-[3rem] border border-white/5 shadow-2xl p-8 md:p-12 max-h-[90vh] overflow-y-auto scrollbar-custom">
            <div class="flex justify-between items-start mb-10">
                <div>
                    <h2 id="modal-user" class="text-5xl font-black italic tracking-tighter text-white uppercase"></h2>
                    <p id="modal-dept" class="text-sm text-red-500 font-bold mt-2 uppercase tracking-widest"></p>
                </div>
                <button onclick="closeModal()" class="text-gray-600 hover:text-white text-5xl font-light">&times;</button>
            </div>

            <div id="qa-container" class="space-y-6">
                <!-- คำถาม/คำตอบ จะแสดงที่นี่ -->
            </div>

            <div class="mt-12 grid grid-cols-2 gap-6">
                <button id="approve-btn" class="bg-green-600 py-6 rounded-[1.5rem] font-black text-xl hover:bg-green-500 transition-all shadow-lg shadow-green-900/20">APPROVE ✔️</button>
                <button id="reject-btn" class="bg-red-700 py-6 rounded-[1.5rem] font-black text-xl hover:bg-red-600 transition-all shadow-lg shadow-red-900/20">REJECT ✖️</button>
            </div>
            <button onclick="deleteForever()" class="w-full mt-6 text-[10px] text-gray-700 hover:text-red-500 font-bold uppercase tracking-[0.3em]">Delete Application Records</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AiZaSyC-y19Y2WF-3efQ0ixWZnosrOeqFaDRvMQ",
            authDomain: "airasia-thaix-career.firebaseapp.com",
            databaseURL: "https://airasia-thaix-career-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "airasia-thaix-career"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentActiveUser = "";

        // --- 1. ระบบ Login (เพิ่มเข้ามาตามที่ต้องการ) ---
        function checkLogin() {
            const u = document.getElementById('user-login').value;
            const p = document.getElementById('pass-login').value;
            
            // ตั้งค่า User/Pass ตรงนี้ได้เลยครับคุณ Dom
            if(u === "admin" && p === "1234") { 
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                setTimeout(() => { document.getElementById('main-content').classList.add('opacity-100'); }, 100);
                fetchAllApps();
                loadDepts();
            } else {
                document.getElementById('login-err').classList.remove('hidden');
            }
        }

        // --- 2. ระบบจัดการแผนก (Management) ---
        function saveDepartment() {
            const name = document.getElementById('dept-name').value.trim();
            const qs = document.getElementById('dept-qs').value.trim();
            if(!name || !qs) return alert("กรุณาระบุชื่อแผนกและคำถาม");

            db.ref('Settings/Departments/' + name).set({
                name: name,
                questions: qs,
                isOpen: true
            }).then(() => {
                alert("บันทึกข้อมูลแผนกสำเร็จ!");
                document.getElementById('dept-name').value = "";
                document.getElementById('dept-qs').value = "";
            });
        }

        function loadDepts() {
            db.ref('Settings/Departments').on('value', snap => {
                const list = document.getElementById('dept-list');
                list.innerHTML = "";
                snap.forEach(child => {
                    const d = child.val();
                    const statusColor = d.isOpen ? 'text-green-500' : 'text-red-500';
                    list.innerHTML += `
                        <div class="bg-slate-900/80 p-4 rounded-2xl flex justify-between items-center border border-slate-800">
                            <div>
                                <p class="text-sm font-bold">${d.name}</p>
                                <p class="text-[9px] font-bold uppercase ${statusColor}">${d.isOpen ? 'Active' : 'Closed'}</p>
                            </div>
                            <button onclick="toggleDept('${d.name}', ${d.isOpen})" class="text-[10px] bg-slate-800 px-3 py-1 rounded-lg hover:bg-slate-700 transition font-bold uppercase">Toggle</button>
                        </div>
                    `;
                });
            });
        }

        function toggleDept(name, current) {
            db.ref('Settings/Departments/' + name).update({ isOpen: !current });
        }

        // --- 3. ระบบจัดการใบสมัคร (Applications) ---
        function fetchAllApps() {
            db.ref('Applications').on('value', snap => renderUI(snap));
        }

        function loadAppsByStatus(status) {
            db.ref('Applications').orderByChild('status').equalTo(status).once('value', snap => renderUI(snap));
        }

        function renderUI(snap) {
            const container = document.getElementById('app-container');
            container.innerHTML = "";
            if(!snap.exists()) {
                container.innerHTML = "<p class='col-span-full text-center text-gray-700 py-20 italic uppercase tracking-widest'>No Data Found</p>";
                return;
            }
            snap.forEach(child => {
                const app = child.val();
                const key = child.key;
                const badge = app.status === 'Pending' ? 'bg-yellow-500/20 text-yellow-500' : (app.status === 'Approved' ? 'bg-green-500/20 text-green-500' : 'bg-red-500/20 text-red-500');
                
                container.innerHTML += `
                    <div onclick="openApp('${key}')" class="glass-panel p-6 rounded-[2rem] border border-white/5 hover:border-red-600/50 cursor-pointer transition-all group">
                        <div class="flex justify-between items-start mb-4">
                            <span class="status-pill ${badge}">${app.status}</span>
                            <span class="text-[9px] text-gray-600 font-bold">${app.time.split(',')[0]}</span>
                        </div>
                        <h4 class="text-xl font-bold group-hover:text-red-500 transition">${key}</h4>
                        <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mt-1">${app.department}</p>
                    </div>
                `;
            });
        }

        function openApp(user) {
            currentActiveUser = user;
            db.ref('Applications/' + user).once('value', snap => {
                const d = snap.val();
                document.getElementById('modal-user').innerText = user;
                document.getElementById('modal-dept').innerText = d.department;
                
                const qa = document.getElementById('qa-container');
                qa.innerHTML = "";

                if(d.fullData) {
                    d.fullData.forEach((item, i) => {
                        qa.innerHTML += `
                            <div class="bg-slate-900/50 p-6 rounded-[2rem] border border-white/5">
                                <p class="text-[10px] text-red-600 font-black uppercase mb-2 tracking-widest italic">Q${i+1}: ${item.q}</p>
                                <p class="text-white font-medium leading-relaxed">${item.a || 'ไม่ได้ระบุคำตอบ'}</p>
                            </div>
                        `;
                    });
                }
                document.getElementById('view-modal').classList.remove('hidden');
            });
        }

        function setStatus(status) {
            if(!currentActiveUser) return;
            db.ref('Applications/' + currentActiveUser).update({ status: status }).then(() => {
                closeModal();
            });
        }

        document.getElementById('approve-btn').onclick = () => setStatus('Approved');
        document.getElementById('reject-btn').onclick = () => setStatus('Rejected');

        function deleteForever() {
            if(confirm("ลบข้อมูลของ " + currentActiveUser + " ถาวร?")) {
                db.ref('Applications/' + currentActiveUser).remove().then(() => closeModal());
            }
        }

        function closeModal() { document.getElementById('view-modal').classList.add('hidden'); }
    </script>
</body>
</html>
