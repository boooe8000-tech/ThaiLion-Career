<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Staff Control Panel | AirAsia Thai X</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Kanit', sans-serif; 
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: #0f172a; /* สีพื้นหลังสำรอง */
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('plane.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* ปรับแต่งกล่อง Login ให้กดได้แน่นอน */
        #login-section {
            position: relative;
            z-index: 50;
        }

        .login-card {
            background-color: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-top: 8px solid #ce1219;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .tab-active { background-color: #ef4444 !important; color: white !important; }
        
        .dashboard-bg {
            background-color: rgba(15, 23, 42, 0.95);
            min-height: 100vh;
            width: 100%;
            position: relative;
            z-index: 60;
        }
    </style>
</head>
<body>

    <div id="login-section" class="min-h-screen flex items-center justify-center p-6">
        <div class="login-card p-8 rounded-[2rem] w-full max-w-md text-gray-800">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-red-600 italic uppercase">Staff Login</h1>
                <p class="text-[10px] text-gray-400 uppercase tracking-widest mt-1">Management Portal</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Username</label>
                    <input type="text" id="login-user" class="w-full border-2 border-gray-100 p-4 rounded-2xl outline-none focus:border-red-500 transition text-gray-700">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Password</label>
                    <input type="password" id="login-pass" class="w-full border-2 border-gray-100 p-4 rounded-2xl outline-none focus:border-red-500 transition text-gray-700">
                </div>
                <button onclick="handleLogin()" class="w-full bg-red-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-red-700 shadow-xl transition active:scale-95 mt-4">
                    เข้าสู่ระบบ ✈️
                </button>
            </div>
        </div>
    </div>

    <div id="staff-dashboard" class="hidden dashboard-bg p-4 md:p-10">
        <div class="max-w-6xl mx-auto space-y-6">
            <div class="flex justify-between items-center border-b border-slate-700 pb-5 text-white">
                <div>
                    <h1 class="text-2xl font-bold text-red-500 italic uppercase">AIRASIA <span class="text-white font-light">SYSTEM</span></h1>
                    <p id="staff-info" class="text-[10px] text-gray-400 mt-1 uppercase"></p>
                </div>
                <button onclick="location.reload()" class="bg-slate-800 px-4 py-1.5 rounded-lg text-xs font-bold hover:bg-red-600 transition">LOGOUT</button>
            </div>

            <div class="flex gap-2 overflow-x-auto pb-2" id="menu-tabs">
                <button onclick="switchTab('apps')" id="btn-apps" class="bg-slate-800 text-white px-5 py-2 rounded-full text-xs font-bold whitespace-nowrap">ใบสมัคร</button>
                <button onclick="switchTab('depts')" id="btn-depts" class="bg-slate-800 text-white px-5 py-2 rounded-full text-xs font-bold whitespace-nowrap">จัดการแผนก</button>
                <button onclick="switchTab('staffs')" id="btn-staff-manage" class="hidden bg-slate-800 text-white px-5 py-2 rounded-full text-xs font-bold whitespace-nowrap">จัดการบัญชี Staff</button>
                <button onclick="switchTab('logs')" id="btn-logs" class="bg-slate-800 text-white px-5 py-2 rounded-full text-xs font-bold whitespace-nowrap">System Logs</button>
            </div>

            <div id="tab-apps" class="tab-content text-white">
                <div class="bg-slate-800/80 rounded-2xl border border-slate-700 overflow-hidden shadow-xl">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-900 text-gray-500 text-[10px] uppercase">
                            <tr>
                                <th class="p-4">ผู้สมัคร (คลิกดูคำตอบ)</th>
                                <th class="p-4">แผนก</th>
                                <th class="p-4 text-center">สถานะ</th>
                                <th class="p-4 text-right" id="th-action">ดำเนินการ</th>
                            </tr>
                        </thead>
                        <tbody id="app-list" class="divide-y divide-slate-700"></tbody>
                    </table>
                </div>
            </div>

            <div id="tab-depts" class="tab-content hidden space-y-6 text-white">
                <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                    <h3 class="font-bold text-blue-400 mb-4 text-sm uppercase">➕ เพิ่มแผนก</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="dept-name" placeholder="ชื่อแผนก" class="bg-slate-900 border border-slate-700 p-3 rounded-xl outline-none text-sm">
                        <input type="text" id="dept-req" placeholder="คุณสมบัติ" class="bg-slate-900 border border-slate-700 p-3 rounded-xl outline-none text-sm">
                        <textarea id="dept-q" placeholder="คำถาม1, คำถาม2 (คั่นด้วย , )" class="bg-slate-900 border border-slate-700 p-3 rounded-xl outline-none md:col-span-2 text-sm" rows="3"></textarea>
                        <button onclick="createDept()" class="bg-blue-600 py-3 rounded-xl font-bold col-span-full">บันทึก</button>
                    </div>
                </div>
                <div id="dept-list" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
            </div>

            <div id="tab-staffs" class="tab-content hidden space-y-4 text-white">
                <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                    <h3 class="font-bold text-purple-400 mb-4 text-sm uppercase">👤 สร้าง Staff</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <input type="text" id="new-staff-user" placeholder="Username" class="bg-slate-900 border border-slate-700 p-3 rounded-xl text-sm outline-none">
                        <input type="text" id="new-staff-pass" placeholder="Password" class="bg-slate-900 border border-slate-700 p-3 rounded-xl text-sm outline-none">
                        <select id="new-staff-role" class="bg-slate-900 border border-slate-700 p-3 rounded-xl text-sm outline-none">
                            <option value="Admin">Admin</option>
                            <option value="Mod">Mod</option>
                        </select>
                        <button onclick="createStaff()" class="bg-purple-600 py-3 rounded-xl font-bold col-span-full">สร้าง</button>
                    </div>
                </div>
                <div id="staff-list" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
            </div>

            <div id="tab-logs" class="tab-content hidden text-white">
                <div id="log-content" class="bg-slate-900 p-4 rounded-2xl text-[11px] font-mono space-y-1 max-h-[500px] overflow-y-auto"></div>
            </div>
        </div>
    </div>

    <div id="view-modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center p-4 z-[100] backdrop-blur-md">
        <div class="bg-slate-900 p-8 rounded-3xl w-full max-w-lg border border-slate-700 text-white">
            <h3 id="view-user" class="text-xl font-bold text-red-500 mb-4 uppercase"></h3>
            <div id="view-ans-box" class="space-y-3 max-h-[60vh] overflow-y-auto"></div>
            <button onclick="closeModal()" class="w-full bg-slate-800 mt-6 py-3 rounded-xl font-bold">ปิด</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AiZaSyC-y19Y2WF-3efQ0ixWZnosrOeqFaDRvMQ",
            authDomain: "airasia-thaix-career.firebaseapp.com",
            databaseURL: "https://airasia-thaix-career-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "airasia-thaix-career"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let userData = { name: "", role: "" };

        function writeLog(action) {
            if(userData.name) db.ref('SystemLogs').push({ staff: userData.name, action, time: new Date().toLocaleString('th-TH') });
        }

        function handleLogin() {
            const u = document.getElementById('login-user').value.trim();
            const p = document.getElementById('login-pass').value.trim();

            if(u === "Dom" && p === "AirAsia") {
                setupDashboard("Dom", "HeadAdmin");
            } else {
                db.ref('Settings/StaffAccounts/' + u).once('value', s => {
                    const d = s.val();
                    if(d && d.password === p) setupDashboard(u, d.role);
                    else alert("ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง");
                });
            }
        }

        function setupDashboard(name, role) {
            userData = { name, role };
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('staff-dashboard').classList.remove('hidden');
            document.getElementById('staff-info').innerText = `Logged in as: ${name} (${role})`;
            
            if(role === "HeadAdmin" || role === "Admin") {
                document.getElementById('btn-staff-manage').classList.remove('hidden');
            }
            if(role === "Mod") {
                document.getElementById('th-action').classList.add('hidden');
            }

            writeLog("เข้าระบบ");
            switchTab('apps');
            loadData();
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('#menu-tabs button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('tab-' + id).classList.remove('hidden');
            document.getElementById('btn-' + (id === 'staffs' ? 'staff-manage' : id)).classList.add('tab-active');
        }

        function createStaff() {
            const u = document.getElementById('new-staff-user').value.trim();
            const p = document.getElementById('new-staff-pass').value.trim();
            const r = document.getElementById('new-staff-role').value;
            if(!u || !p) return;
            db.ref('Settings/StaffAccounts/' + u).set({ password: p, role: r }).then(() => { alert("สร้างสำเร็จ"); });
        }

        function createDept() {
            const n = document.getElementById('dept-name').value.trim();
            const r = document.getElementById('dept-req').value.trim();
            const q = document.getElementById('dept-q').value.trim();
            if(!n) return;
            db.ref('Settings/Departments/' + n).set({ name: n, requirement: r, questions: q, isOpen: true }).then(() => { alert("บันทึกสำเร็จ"); });
        }

        function setStatus(user, status) {
            db.ref('Applications/' + user).update({ status });
        }

        function viewDetail(user) {
            db.ref('Applications/' + user).once('value', s => {
                const d = s.val();
                document.getElementById('view-user').innerText = user;
                const box = document.getElementById('view-ans-box');
                box.innerHTML = "";
                if(d.answers) {
                    d.answers.forEach((ans, i) => {
                        box.innerHTML += `<div class="bg-slate-800 p-4 rounded-xl border border-slate-700 mb-2"><p class="text-[9px] text-red-500 font-bold uppercase">คำถามที่ ${i+1}</p><p class="text-sm">${ans || '-'}</p></div>`;
                    });
                }
                document.getElementById('view-modal').classList.remove('hidden');
            });
        }

        function closeModal() { document.getElementById('view-modal').classList.add('hidden'); }

        function loadData() {
            db.ref('Applications').on('value', snap => {
                const list = document.getElementById('app-list');
                list.innerHTML = "";
                snap.forEach(c => {
                    const a = c.val();
                    const isMod = userData.role === "Mod";
                    list.innerHTML += `
                        <tr class="hover:bg-slate-700/30">
                            <td class="p-4 font-bold text-blue-400 cursor-pointer" onclick="viewDetail('${c.key}')">${c.key} 🔍</td>
                            <td class="p-4 text-gray-400 text-xs">${a.department}</td>
                            <td class="p-4 text-center"><span class="px-2 py-0.5 rounded bg-slate-700 text-[10px] font-bold uppercase">${a.status}</span></td>
                            <td class="p-4 text-right space-x-1 ${isMod ? 'hidden' : ''}">
                                <button onclick="setStatus('${c.key}', 'Passed')" class="bg-green-600 px-3 py-1 rounded text-[10px] font-bold">PASS</button>
                                <button onclick="setStatus('${c.key}', 'Failed')" class="bg-red-600 px-3 py-1 rounded text-[10px] font-bold">FAIL</button>
                            </td>
                        </tr>
                    `;
                });
            });

            db.ref('Settings/Departments').on('value', snap => {
                const list = document.getElementById('dept-list');
                list.innerHTML = "";
                snap.forEach(c => {
                    const d = c.val();
                    list.innerHTML += `<div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
                        <p class="font-bold text-sm mb-2">${d.name}</p>
                        <button onclick="if(confirm('ลบ?')) db.ref('Settings/Departments/${d.name}').remove()" class="text-red-500 text-xs uppercase">Delete</button>
                    </div>`;
                });
            });

            db.ref('Settings/StaffAccounts').on('value', snap => {
                const list = document.getElementById('staff-list');
                list.innerHTML = "";
                snap.forEach(c => {
                    list.innerHTML += `<div class="bg-slate-800 p-3 rounded-xl border border-slate-700 flex justify-between">
                        <span class="text-sm">${c.key}</span>
                        <button onclick="if(confirm('ลบ?')) db.ref('Settings/StaffAccounts/${c.key}').remove()" class="text-red-500 text-xs">ลบ</button>
                    </div>`;
                });
            });

            db.ref('SystemLogs').limitToLast(50).on('value', snap => {
                const box = document.getElementById('log-content');
                box.innerHTML = "";
                let logs = []; snap.forEach(c => logs.push(c.val())); logs.reverse().forEach(l => {
                    box.innerHTML += `<p class="text-gray-400"><span class="text-red-500">${l.staff}</span>: ${l.action}</p>`;
                });
            });
        }
    </script>
</body>
</html>
